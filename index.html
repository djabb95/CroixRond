<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croix Rond – Le jeu de Yakhya</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5BAE00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Croix Rond">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Lora:ital,wght@0,400;0,600;1,500&family=Caveat:wght@500;600;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  /* These are overridden by theme classes */
  --bg: #5BAE00;
  --bg-alt: #4A9000;
  --bg-deep: #2D5500;
  --board-bg: #8B6F47;
  --board-edge: #6B5435;
  --cell-bg: #C7B299;
  --cell-edge: #8B6F47;
  --primary: #FFAA00;
  --secondary: #50C878;
  --accent: #FF5555;
  --text: #FFFFFF;
  --text-dark: #1E1E1E;
  --shadow: rgba(0, 0, 0, 0.4);
}

/* ============================================ */
/* THEME: YAKHYA (MINECRAFT)                    */
/* ============================================ */
body.theme-yakhya {
  --bg:        #5BAE00;
  --bg-alt:    #4A9000;
  --bg-deep:   #2D5500;
  --board-bg:  #8B6F47;
  --board-edge:#6B5435;
  --cell-bg:   #C7B299;
  --cell-edge: #8B6F47;
  --primary:   #FFAA00;
  --secondary: #50C878;
  --accent:    #FF5555;
  --text:      #FFFFFF;
  --text-dark: #1E1E1E;
  --shadow:    rgba(0, 0, 0, 0.4);
  font-family: 'VT323', monospace;
  background: var(--bg);
}

body.theme-yakhya::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 64px, rgba(0,0,0,0.04) 64px 65px),
    repeating-linear-gradient(90deg, transparent 0 64px, rgba(0,0,0,0.04) 64px 65px);
  background-size: 64px 64px;
}

body.theme-yakhya::after {
  content: '';
  position: fixed; bottom: 0; left: 0; right: 0; height: 80px; z-index: 0; pointer-events: none;
  background: linear-gradient(180deg, transparent, var(--bg-deep) 80%);
}

/* ============================================ */
/* THEME: MAKKA (OLIVE ELEGANT)                 */
/* ============================================ */
body.theme-makka {
  --bg:        #EDE4D0;
  --bg-alt:    #F5EFE0;
  --bg-deep:   #D6C9A8;
  --board-bg:  #FAF6EC;
  --board-edge: rgba(58,74,38,0.2);
  --cell-bg:   #F5EFE0;
  --cell-edge: rgba(58,74,38,0.15);
  --primary:   #5A6B3A;
  --secondary: #B89668;
  --accent:    #C44569;
  --text:      #2A2D1E;
  --text-dark: #2A2D1E;
  --shadow:    rgba(58,74,38,0.12);
  font-family: 'Lora', Georgia, serif;
  background: var(--bg);
}

body.theme-makka::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(184,150,104,0.10), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(90,107,58,0.10), transparent 60%);
}

/* ============================================ */
/* BASE                                         */
/* ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: 16px 0;
  transition: background-color 0.5s ease;
}
@media (max-height: 700px) {
  body { justify-content: flex-start; padding-top: 12px; }
}

/* ============================================ */
/* TOP CONTROLS                                 */
/* ============================================ */
.top-controls {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 50;
  display: flex;
  gap: 8px;
  align-items: center;
}

.theme-switcher {
  display: flex;
  background: rgba(0,0,0,0.25);
  border-radius: 0;
  padding: 4px;
  gap: 4px;
}

.theme-btn {
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.7);
  padding: 8px 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  transition: all 0.2s;
  font-family: inherit;
  text-transform: uppercase;
}

.theme-btn.active {
  background: var(--primary);
  color: var(--text-dark);
}

body.theme-yakhya .theme-switcher {
  background: var(--board-bg);
  border: 3px solid var(--board-edge);
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), 4px 4px 0 var(--bg-deep);
}
body.theme-yakhya .theme-btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 8px 10px; }

body.theme-makka .theme-switcher {
  background: var(--board-bg);
  border: 1px solid var(--board-edge);
  border-radius: 50px;
  box-shadow: 0 4px 12px var(--shadow);
}
body.theme-makka .theme-btn {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(42,45,30,0.5);
  border-radius: 50px;
}
body.theme-makka .theme-btn.active {
  background: var(--primary);
  color: #FAF6EC;
}

.sound-toggle {
  background: rgba(0,0,0,0.25);
  border: none;
  width: 38px;
  height: 38px;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  transition: all 0.2s;
}
body.theme-yakhya .sound-toggle {
  background: var(--board-bg);
  border: 3px solid var(--board-edge);
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2), 4px 4px 0 var(--bg-deep);
}
body.theme-makka .sound-toggle {
  background: var(--board-bg);
  border: 1px solid var(--board-edge);
  border-radius: 50%;
  box-shadow: 0 4px 12px var(--shadow);
  color: var(--primary);
}

/* ============================================ */
/* BACKGROUND ANIMATIONS                        */
/* ============================================ */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}

/* Minecraft: floating particles (block dust) */
.mc-particle {
  position: absolute;
  animation: mcFloat var(--dur, 12s) linear infinite;
  opacity: var(--op, 0.5);
}
@keyframes mcFloat {
  0%   { transform: translate3d(0, 110vh, 0); }
  100% { transform: translate3d(var(--drift, 30px), -10vh, 0); }
}

/* Makka: olive leaves */
.olive-leaf-bg {
  position: absolute; top: -40px;
  animation: leafFallBg var(--dur, 18s) linear infinite;
  opacity: var(--op, 0.4);
}
@keyframes leafFallBg {
  0%   { transform: translate3d(0, -10vh, 0) rotate(0deg); }
  50%  { transform: translate3d(var(--drift, 40px), 50vh, 0) rotate(180deg); }
  100% { transform: translate3d(0, 110vh, 0) rotate(360deg); }
}

/* ============================================ */
/* GAME WRAPPER                                 */
/* ============================================ */
.game-wrapper {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 18px;
  padding: 16px 20px;
  width: 100%; max-width: 460px;
}

/* ============================================ */
/* TITLE                                        */
/* ============================================ */
.title-wrap { text-align: center; padding-top: 38px; }

.title {
  font-size: clamp(36px, 9vw, 56px);
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: 1;
  cursor: pointer;
  user-select: none;
}

body.theme-yakhya .title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(22px, 6vw, 36px);
  color: var(--primary);
  text-shadow: 4px 4px 0 var(--bg-deep), 4px 4px 8px rgba(0,0,0,0.4);
  letter-spacing: 4px;
}

body.theme-makka .title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: clamp(46px, 11vw, 68px);
  color: var(--primary);
  letter-spacing: -1px;
  text-transform: none;
}

.subtitle {
  margin-top: 6px;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0.85;
}
body.theme-yakhya .subtitle {
  font-family: 'VT323', monospace;
  font-size: 17px;
  color: var(--secondary);
  text-shadow: 2px 2px 0 var(--bg-deep);
  letter-spacing: 2px;
}
body.theme-makka .subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--secondary);
  letter-spacing: 3px;
  text-transform: none;
}

/* ============================================ */
/* PLAYER CARDS                                 */
/* ============================================ */
.players { display: flex; width: 100%; gap: 10px; align-items: stretch; }
.vs-label {
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 12px; letter-spacing: 2px;
  padding: 0 4px;
}
body.theme-yakhya .vs-label { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--text); }
body.theme-makka  .vs-label { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--secondary); font-size: 14px; }

.player-card {
  flex: 1;
  padding: 12px 10px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  transition: all 0.3s;
  position: relative;
}

body.theme-yakhya .player-card {
  background: var(--board-bg);
  border: 4px solid var(--board-edge);
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 4px 4px 0 var(--bg-deep);
  color: var(--text);
}
body.theme-yakhya .player-card.active {
  background: var(--cell-bg);
  border-color: var(--primary);
  transform: translate(-2px, -2px);
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 6px 6px 0 var(--bg-deep);
}

body.theme-makka .player-card {
  background: var(--board-bg);
  border: 1px solid var(--board-edge);
  border-radius: 16px;
  box-shadow: 0 4px 16px var(--shadow);
}
body.theme-makka .player-card.active {
  border-color: var(--primary);
  border-width: 1.5px;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--shadow);
}

.player-symbol { font-size: 26px; line-height: 1; }
body.theme-yakhya .player-card.yakhya .player-symbol { font-family: 'Press Start 2P', monospace; color: var(--primary); font-size: 22px; text-shadow: 2px 2px 0 var(--bg-deep); }
body.theme-yakhya .player-card.adv    .player-symbol { font-family: 'Press Start 2P', monospace; color: var(--secondary); font-size: 22px; text-shadow: 2px 2px 0 var(--bg-deep); }
body.theme-makka .player-card.yakhya .player-symbol { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--primary); font-size: 30px; }
body.theme-makka .player-card.adv    .player-symbol { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--secondary); font-size: 30px; }

.player-name { font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
body.theme-yakhya .player-name { font-family: 'VT323', monospace; font-size: 18px; color: var(--text); text-shadow: 2px 2px 0 var(--text-dark); }
body.theme-makka  .player-name { font-family: 'Lora', serif; font-size: 13px; color: var(--text); }

.player-score { font-size: 26px; line-height: 1; transition: transform 0.2s; }
body.theme-yakhya .player-card.yakhya .player-score { font-family: 'Press Start 2P', monospace; color: var(--primary); font-size: 20px; text-shadow: 2px 2px 0 var(--bg-deep); }
body.theme-yakhya .player-card.adv    .player-score { font-family: 'Press Start 2P', monospace; color: var(--secondary); font-size: 20px; text-shadow: 2px 2px 0 var(--bg-deep); }
body.theme-makka  .player-card.yakhya .player-score { font-family: 'Cormorant Garamond', serif; color: var(--primary); font-size: 30px; font-weight: 600; }
body.theme-makka  .player-card.adv    .player-score { font-family: 'Cormorant Garamond', serif; color: var(--secondary); font-size: 30px; font-weight: 600; }

.score-pop { animation: scorePop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes scorePop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

.active-badge { font-size: 10px; font-weight: 800; padding: 3px 10px; opacity: 0; transition: opacity 0.3s; text-transform: uppercase; letter-spacing: 1px; }
.player-card.active .active-badge { opacity: 1; }
body.theme-yakhya .active-badge { font-family: 'VT323', monospace; background: var(--primary); color: var(--text-dark); font-size: 13px; }
body.theme-yakhya .player-card.adv.active .active-badge { background: var(--secondary); }
body.theme-makka .active-badge { background: rgba(90,107,58,0.15); color: var(--primary); border-radius: 20px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 11px; letter-spacing: 2px; }
body.theme-makka .player-card.adv.active .active-badge { background: rgba(184,150,104,0.15); color: var(--secondary); }

/* ============================================ */
/* BOARD                                        */
/* ============================================ */
.board-wrap { position: relative; width: 100%; }
.board {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; padding: 14px;
  width: 100%;
}

body.theme-yakhya .board {
  background: var(--board-bg);
  border: 4px solid var(--board-edge);
  box-shadow: inset 0 -6px 0 rgba(0,0,0,0.25), 6px 6px 0 var(--bg-deep);
}
body.theme-makka .board {
  background: var(--board-bg);
  border: 1px solid var(--board-edge);
  border-radius: 24px;
  box-shadow: 0 12px 32px var(--shadow);
  padding: 18px;
  gap: 10px;
}

.cell {
  background: var(--cell-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(32px, 8vw, 50px);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

body.theme-yakhya .cell {
  border: 3px solid var(--cell-edge);
  box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15);
}
body.theme-yakhya .cell:hover:not(.taken) {
  background: #DCC9B4;
  transform: translate(-1px, -1px);
}

body.theme-makka .cell {
  border: 1px solid var(--cell-edge);
  border-radius: 14px;
}
body.theme-makka .cell:hover:not(.taken) {
  background: #FFFCF3;
  transform: scale(1.04);
  border-color: var(--primary);
}

.cell.taken { cursor: default; }

body.theme-yakhya .cell.x-mark { color: var(--primary); font-family: 'Press Start 2P', monospace; font-size: clamp(26px, 6vw, 40px); text-shadow: 3px 3px 0 var(--bg-deep); }
body.theme-yakhya .cell.o-mark { color: var(--secondary); font-family: 'Press Start 2P', monospace; font-size: clamp(26px, 6vw, 40px); text-shadow: 3px 3px 0 var(--bg-deep); }
body.theme-makka  .cell.x-mark { color: var(--primary); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(40px, 10vw, 64px); font-weight: 500; }
body.theme-makka  .cell.o-mark { color: var(--secondary); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(40px, 10vw, 64px); font-weight: 500; }

.cell-txt { position: relative; z-index: 1; animation: cellPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes cellPop {
  0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
  60%  { transform: scale(1.3) rotate(5deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.cell.winning { animation: winPulse 0.6s ease-in-out infinite alternate; z-index: 2; }
body.theme-yakhya .cell.winning { background: #F5E6C8; border-color: var(--primary); }
body.theme-makka  .cell.winning { background: #FFFCF3; border-color: var(--primary); box-shadow: 0 0 30px rgba(90,107,58,0.3); }
@keyframes winPulse { from{transform:scale(1)} to{transform:scale(1.08)} }

/* ============================================ */
/* WIN LINE (sweeping animation)                */
/* ============================================ */
.win-line {
  position: absolute;
  height: 8px;
  background: var(--primary);
  z-index: 5;
  transform-origin: 0 50%;
  opacity: 0;
  pointer-events: none;
}
body.theme-yakhya .win-line {
  background: var(--primary);
  box-shadow: 0 0 0 2px var(--bg-deep), 0 0 20px var(--primary);
  height: 10px;
}
body.theme-makka .win-line {
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
  height: 4px;
  border-radius: 4px;
  box-shadow: 0 0 20px rgba(184,150,104,0.6);
}

/* ============================================ */
/* STATUS                                       */
/* ============================================ */
.status { text-align: center; min-height: 24px; font-weight: 700; }
body.theme-yakhya .status { font-family: 'VT323', monospace; font-size: 20px; color: var(--text); text-shadow: 2px 2px 0 var(--text-dark); }
body.theme-makka  .status { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 17px; color: var(--text); letter-spacing: 0.5px; }

/* ============================================ */
/* RESET BUTTON                                 */
/* ============================================ */
.btn-reset {
  border: none; cursor: pointer;
  padding: 12px 32px;
  font-weight: 800; letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.2s;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
body.theme-yakhya .btn-reset {
  background: var(--board-bg);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  border: 4px solid var(--board-edge);
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 4px 4px 0 var(--bg-deep);
  text-shadow: 2px 2px 0 var(--text-dark);
}
body.theme-yakhya .btn-reset:hover { background: var(--cell-bg); transform: translate(-1px, -1px); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 5px 5px 0 var(--bg-deep); }
body.theme-yakhya .btn-reset:active { transform: translate(2px, 2px); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 2px 2px 0 var(--bg-deep); }

body.theme-makka .btn-reset {
  background: transparent;
  color: var(--primary);
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  border: 1.5px solid var(--primary);
  border-radius: 50px;
  font-weight: 600;
}
body.theme-makka .btn-reset:hover { background: var(--primary); color: #FAF6EC; }

/* ============================================ */
/* TOAST MESSAGE                                */
/* ============================================ */
.toast {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-150px);
  padding: 14px 20px;
  text-align: center;
  max-width: 90vw; min-width: 280px;
  z-index: 1000;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
  opacity: 0;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

body.theme-yakhya .toast {
  background: var(--board-bg);
  border: 4px solid var(--board-edge);
  box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 5px 5px 0 var(--bg-deep);
  color: var(--text);
}
body.theme-makka .toast {
  background: var(--board-bg);
  border: 1.5px solid var(--board-edge);
  border-radius: 18px;
  box-shadow: 0 12px 40px var(--shadow);
  color: var(--text);
}

.toast-emoji { font-size: 26px; display: block; margin-bottom: 4px; animation: emojiPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes emojiPop { 0%{transform:scale(0) rotate(-15deg)} 70%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }

.toast-text { font-weight: 700; line-height: 1.4; }
body.theme-yakhya .toast-text { font-family: 'VT323', monospace; font-size: 17px; text-shadow: 2px 2px 0 var(--text-dark); letter-spacing: 0.5px; }
body.theme-makka  .toast-text { font-family: 'Lora', serif; font-size: 14px; font-weight: 600; }

.toast.t-yakhya { border-color: var(--primary); }
body.theme-yakhya .toast.t-yakhya .toast-text { color: var(--primary); }
body.theme-makka  .toast.t-yakhya .toast-text { color: var(--primary); }

.toast.t-adv { border-color: var(--secondary); }
body.theme-yakhya .toast.t-adv .toast-text { color: var(--secondary); }
body.theme-makka  .toast.t-adv .toast-text { color: var(--secondary); }

.toast.t-win { border-color: var(--accent); }
body.theme-yakhya .toast.t-win .toast-text { color: var(--accent); font-size: 19px; }
body.theme-makka  .toast.t-win .toast-text { color: var(--accent); font-size: 16px; font-weight: 700; }

.toast.t-egg { }
body.theme-yakhya .toast.t-egg { border-color: #FF55FF; }
body.theme-yakhya .toast.t-egg .toast-text { color: #FF55FF; font-size: 16px; }

// ============================================
// SOUND SYSTEM (Web Audio API)
// ============================================
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.log('Web Audio non supporté'); }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type='sine', volume=0.08, delay=0) {
  if (!soundEnabled || !audioCtx) return;
  setTimeout(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }, delay);
}

function sfx(name) {
  const theme = document.body.classList.contains('theme-makka') ? 'makka' : 'yakhya';
  const wave = theme === 'yakhya' ? 'square' : 'sine';
  const vol = theme === 'yakhya' ? 0.07 : 0.06;

  switch(name) {
    case 'move-y':
      playTone(theme === 'yakhya' ? 660 : 880, 0.08, wave, vol);
      playTone(theme === 'yakhya' ? 880 : 1108, 0.10, wave, vol*0.7, 60);
      break;
    case 'move-a':
      playTone(theme === 'yakhya' ? 440 : 660, 0.08, wave, vol);
      playTone(theme === 'yakhya' ? 587 : 880, 0.10, wave, vol*0.7, 60);
      break;
    case 'win':
      if (theme === 'yakhya') {
        // 8bit fanfare: C-E-G-C
        playTone(523, 0.12, 'square', 0.08, 0);
        playTone(659, 0.12, 'square', 0.08, 130);
        playTone(784, 0.12, 'square', 0.08, 260);
        playTone(1047, 0.3, 'square', 0.08, 390);
      } else {
        // Elegant chime: C-E-G arpeggio
        playTone(523, 0.4, 'sine', 0.07, 0);
        playTone(659, 0.4, 'sine', 0.06, 150);
        playTone(784, 0.5, 'sine', 0.06, 300);
        playTone(1047, 0.6, 'sine', 0.05, 500);
      }
      break;
    case 'lose':
      if (theme === 'yakhya') {
        playTone(440, 0.15, 'square', 0.06, 0);
        playTone(370, 0.15, 'square', 0.06, 160);
        playTone(294, 0.25, 'square', 0.06, 320);
      } else {
        playTone(523, 0.3, 'sine', 0.05, 0);
        playTone(440, 0.3, 'sine', 0.05, 250);
        playTone(370, 0.4, 'sine', 0.04, 500);
      }
      break;
    case 'draw':
      playTone(440, 0.2, wave, vol*0.8, 0);
      playTone(440, 0.2, wave, vol*0.8, 250);
      break;
    case 'egg':
      // Surprise twinkle
      playTone(880, 0.08, wave, vol, 0);
      playTone(1109, 0.08, wave, vol, 80);
      playTone(1318, 0.12, wave, vol, 160);
      playTone(1760, 0.2, wave, vol*0.7, 280);
      break;
    case 'click':
      playTone(theme === 'yakhya' ? 880 : 1200, 0.04, wave, vol*0.5);
      break;
  }
}

function drawWinLine(winData) {
  const cells = boardEl.querySelectorAll('.cell');
  const c1 = cells[winData.combo[0]];
  const c3 = cells[winData.combo[2]];
  if (!c1 || !c3) return;

  const r1 = c1.getBoundingClientRect();
  const r3 = c3.getBoundingClientRect();
  const wrap = winLine.parentElement.getBoundingClientRect();

  const startX = r1.left + r1.width/2 - wrap.left;
  const startY = r1.top + r1.height/2 - wrap.top;
  const endX   = r3.left + r3.width/2 - wrap.left;
  const endY   = r3.top + r3.height/2 - wrap.top;

  const length = Math.hypot(endX - startX, endY - startY);
  const angle  = Math.atan2(endY - startY, endX - startX);

  winLine.style.left = startX + 'px';
  winLine.style.top  = startY + 'px';
  winLine.style.width = '0px';
  winLine.style.transform = `translateY(-50%) rotate(${angle}rad)`;
  winLine.style.opacity = '1';

  // Animate
  requestAnimationFrame(() => {
    winLine.style.transition = 'width 0.5s cubic-bezier(0.22,1,0.36,1)';
    winLine.style.width = length + 'px';
  });

  // Fade out after the sweep
  setTimeout(() => {
    winLine.style.transition = 'opacity 0.5s';
    winLine.style.opacity = '0';
  }, 2500);
}

function launchWinParticles() {
  const theme = document.body.classList.contains('theme-makka') ? 'makka' : 'yakhya';

  if (theme === 'yakhya') {
    // Pixel blocks falling
    const colors = ['#FFAA00', '#50C878', '#FF5555', '#FFE48F', '#7CFC00', '#FFFFFF'];
    for (let i = 0; i < 70; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle pixel-block';
        const sz = 8 + Math.random() * 8;
        p.style.cssText = `
          width:${sz}px;height:${sz}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          left:${5+Math.random()*90}vw;
          --dur:${1.5 + Math.random()*2}s;
          box-shadow:inset 0 -2px 0 rgba(0,0,0,0.3);
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }, i * 30);
    }
  } else {
    // Olive leaves + gold dust
    const leafSVG = `<svg width="24" height="32" viewBox="0 0 24 30" fill="none">
      <path d="M12 2 C 4 6, 2 16, 12 28 C 22 16, 20 6, 12 2 Z" fill="#5A6B3A"/>
      <path d="M12 4 L12 26" stroke="#3D4A26" stroke-width="0.4"/>
    </svg>`;
    const goldSVG = `<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="4" fill="#B89668"/></svg>`;
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle olive-particle';
        p.innerHTML = Math.random() > 0.4 ? leafSVG : goldSVG;
        p.style.cssText = `
          left:${5+Math.random()*90}vw;
          --dur:${2.5 + Math.random()*2}s;
          --drift:${(Math.random()-0.5)*150}px;
          transform:scale(${0.7+Math.random()*0.7});
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
      }, i * 50);
    }
  }
}

// ============================================
// EGG SYSTEM
// ============================================
function nextEgg() {
  const m = MSG.egg[eggIdx % MSG.egg.length];
  eggIdx++;
  return m;
}
function fireEgg(delay = 5200) {
  setTimeout(() => {
    const m = nextEgg();
    showToast([m], 't-egg', 5500);
    sfx('egg');
  }, delay);
}

// ============================================
// CLICK HANDLER
// ============================================
function click(idx) {
  if (over || board[idx]) return;
  board[idx] = cur;

  const cells = boardEl.querySelectorAll('.cell');
  const cell  = cells[idx];
  cell.classList.add('taken', cur === 'X' ? 'x-mark' : 'o-mark');
  const txt = document.createElement('span');
  txt.className = 'cell-txt';
  txt.textContent = cur === 'X' ? '✕' : '○';
  cell.appendChild(txt);

  sfx(cur === 'X' ? 'move-y' : 'move-a');
  showToast(cur === 'X' ? MSG.yakhya : MSG.adv, cur === 'X' ? 't-yakhya' : 't-adv');

  const win = checkWin(cur);
  if (win) {
    over = true;
    totalGames++;
    win.combo.forEach(i => cells[i].classList.add('winning'));
    drawWinLine(win);

    if (cur === 'X') {
      scores.X++;
      scoreY.textContent = scores.X;
      scoreY.classList.add('score-pop');
      setTimeout(() => scoreY.classList.remove('score-pop'), 400);
      setTimeout(() => { showToast(MSG.yWin, 't-win', 4500); sfx('win'); launchWinParticles(); }, 600);
      statusEl.textContent = '🏆 Yakhya GAGNE ! Comme prévu mathématiquement.';
      if (scores.X % 3 === 0) fireEgg(5500);
    } else {
      scores.O++;
      scoreA.textContent = scores.O;
      scoreA.classList.add('score-pop');
      setTimeout(() => scoreA.classList.remove('score-pop'), 400);
      setTimeout(() => { showToast(MSG.aWin, 't-adv', 4000); sfx('lose'); }, 600);
      statusEl.textContent = '🤨 L\'adversaire gagne... très suspect.';
      if (scores.O === 2 || scores.O === 4 || scores.O === 6) {
        setTimeout(() => showToast(MSG.eggTraitor, 't-egg', 5000), 5000);
      }
    }
    if (totalGames % 5 === 0) fireEgg(scores.X % 3 === 0 ? 11500 : 5500);
    setActive(null);
    return;
  }

  if (board.every(v => v)) {
    over = true;
    totalGames++;
    setTimeout(() => { showToast(MSG.draw, 't-draw', 4000); sfx('draw'); }, 600);
    statusEl.textContent = '🤝 Match nul ! Recomptage demandé par Yakhya.';
    if (totalGames % 5 === 0) fireEgg(5500);
    setActive(null);
    return;
  }

  cur = cur === 'X' ? 'O' : 'X';
  setActive(cur);
  statusEl.textContent = cur === 'X' ? 'C\'est à Yakhya de jouer ! 👑' : 'L\'adversaire tente sa chance...';
}

function setActive(p) {
  cardY.classList.toggle('active', p === 'X');
  cardA.classList.toggle('active', p === 'O');
}

// ============================================
// RESET
// ============================================
document.getElementById('btnReset').addEventListener('click', () => {
  initAudio();
  sfx('click');
  board = Array(9).fill(null);
  cur = 'X';
  over = false;
  winLine.style.opacity = '0';
  winLine.style.transition = 'none';
  winLine.style.width = '0px';
  buildBoard();
  setActive('X');
  statusEl.textContent = 'C\'est à Yakhya de jouer ! 👑';
});

// ============================================
// EASTER EGGS
// ============================================
document.getElementById('mainTitle').addEventListener('click', () => {
  titleClicks++;
  clearTimeout(titleTimer);
  titleTimer = setTimeout(() => { titleClicks = 0; }, 600);
  if (titleClicks >= 3) {
    titleClicks = 0;
    initAudio();
    const m = MSG.eggSecret[Math.floor(Math.random() * MSG.eggSecret.length)];
    showToast([m], 't-egg', 5500);
    sfx('egg');
  }
});

document.addEventListener('keydown', (e) => {
  kbBuffer = (kbBuffer + e.key.toLowerCase()).slice(-5);
  if (kbBuffer === 'makka') {
    kbBuffer = '';
    initAudio();
    const m = MSG.eggSecret[Math.floor(Math.random() * MSG.eggSecret.length)];
    showToast([m], 't-egg', 5500);
    sfx('egg');
  }
});

// ============================================
// INIT
// ============================================
buildBoard();
setActive('X');
rebuildBackground();
</script>
