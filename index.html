<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croix Rond – Le jeu de Yakhya</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07071a;
  --card: #10102a;
  --card2: rgba(255,255,255,0.04);
  --yakhya: #ffb347;
  --yakhya2: #ff6b00;
  --yakhya-glow: rgba(255,179,71,0.25);
  --adv: #a78bfa;
  --adv2: #6d28d9;
  --adv-glow: rgba(167,139,250,0.25);
  --accent: #ff4d6d;
  --text: #ffffff;
  --muted: rgba(255,255,255,0.45);
  --border: rgba(255,255,255,0.08);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  padding: 16px 0;
}
@media (max-height: 680px) {
  body { justify-content: flex-start; padding-top: 10px; }
}

/* ---- ANIMATED BG ---- */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
  animation: orbDrift 12s ease-in-out infinite alternate;
}
.orb1 { width:400px; height:400px; background:var(--yakhya2); top:-100px; left:-100px; animation-delay:0s; }
.orb2 { width:350px; height:350px; background:var(--adv2); bottom:-80px; right:-80px; animation-delay:-5s; }
.orb3 { width:250px; height:250px; background:var(--accent); top:40%; left:55%; animation-delay:-8s; }

@keyframes orbDrift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,30px) scale(1.1); }
}

.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
  animation: twinkle var(--d) ease-in-out infinite; opacity:0;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.6); }
  50%      { opacity:0.9; transform:scale(1.4); }
}

/* ---- WRAPPER ---- */
.game-wrapper {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:22px;
  padding:24px 20px; width:100%; max-width:460px;
}

/* ---- TITLE ---- */
.title-wrap { text-align:center; }
.title {
  font-family:'Russo One',sans-serif;
  font-size:clamp(34px,9vw,56px);
  background: linear-gradient(135deg, var(--yakhya) 0%, var(--accent) 50%, var(--adv) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:3px; text-transform:uppercase;
  animation: titleShimmer 4s ease-in-out infinite;
  background-size: 200%;
}
@keyframes titleShimmer {
  0%,100% { background-position:0% 50%; }
  50%      { background-position:100% 50%; }
}
.subtitle {
  font-size:11px; color:var(--muted); letter-spacing:3px;
  text-transform:uppercase; margin-top:4px;
}

/* ---- PLAYER CARDS ---- */
.players { display:flex; width:100%; gap:10px; align-items:stretch; }
.vs-label {
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  font-family:'Russo One',sans-serif; font-size:11px; color:var(--muted);
  letter-spacing:2px; padding:0 4px;
}

.player-card {
  flex:1; background:var(--card); border-radius:18px; padding:14px 10px;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  border:1.5px solid var(--border); transition:all 0.35s ease;
  position:relative; overflow:hidden;
}
.player-card::before {
  content:''; position:absolute; inset:0; border-radius:16px; opacity:0; transition:opacity 0.35s;
}
.player-card.yakhya::before { background:radial-gradient(ellipse at 50% 0%, var(--yakhya-glow), transparent 70%); }
.player-card.adv::before    { background:radial-gradient(ellipse at 50% 0%, var(--adv-glow), transparent 70%); }
.player-card.active::before { opacity:1; }
.player-card.active.yakhya  { border-color:var(--yakhya); }
.player-card.active.adv     { border-color:var(--adv); }

.player-symbol { font-family:'Russo One',sans-serif; font-size:26px; line-height:1; }
.player-card.yakhya .player-symbol { color:var(--yakhya); }
.player-card.adv    .player-symbol { color:var(--adv); }

.player-name { font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--text); }

.player-score {
  font-family:'Russo One',sans-serif; font-size:28px; line-height:1;
  transition:transform 0.2s;
}
.player-card.yakhya .player-score { color:var(--yakhya); }
.player-card.adv    .player-score { color:var(--adv); }
.score-pop { animation:scorePop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes scorePop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

.active-badge {
  font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
  padding:3px 10px; border-radius:20px; opacity:0; transition:opacity 0.3s;
}
.player-card.active .active-badge { opacity:1; }
.player-card.active.yakhya .active-badge { background:rgba(255,179,71,0.2); color:var(--yakhya); }
.player-card.active.adv    .active-badge { background:rgba(167,139,250,0.2); color:var(--adv); }

/* ---- BOARD ---- */
.board {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
  padding:16px; background:var(--card); border-radius:24px;
  border:1px solid var(--border); width:100%;
}

.cell {
  background:var(--card2); border-radius:14px; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-family:'Russo One',sans-serif; font-size:clamp(30px,7vw,48px);
  cursor:pointer; transition:background 0.2s, transform 0.2s, border-color 0.2s;
  position:relative; overflow:hidden; aspect-ratio:1; user-select:none;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
.cell:hover:not(.taken) {
  background:rgba(255,255,255,0.07); transform:scale(1.05); border-color:rgba(255,255,255,0.25);
}
.cell.taken { cursor:default; }

.cell.x-mark { color:var(--yakhya); }
.cell.o-mark { color:var(--adv); }

.cell.x-mark .glow-bg { background:radial-gradient(circle, var(--yakhya-glow), transparent 70%); }
.cell.o-mark .glow-bg { background:radial-gradient(circle, var(--adv-glow), transparent 70%); }
.glow-bg { position:absolute; inset:0; border-radius:14px; }

.cell-txt { position:relative; z-index:1; animation:cellPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes cellPop {
  0%   { transform:scale(0) rotate(-20deg); opacity:0; }
  60%  { transform:scale(1.25) rotate(5deg); }
  100% { transform:scale(1) rotate(0deg); opacity:1; }
}

.cell.winning { animation:winPulse 0.55s ease-in-out infinite alternate; }
.cell.winning.x-mark { border-color:var(--yakhya); box-shadow:0 0 18px var(--yakhya-glow); }
.cell.winning.o-mark { border-color:var(--adv);    box-shadow:0 0 18px var(--adv-glow); }
@keyframes winPulse { from{transform:scale(1)} to{transform:scale(1.07)} }

/* ---- STATUS ---- */
.status {
  font-size:14px; color:var(--muted); text-align:center;
  min-height:22px; letter-spacing:.5px; font-weight:700;
  transition:opacity 0.3s;
}

/* ---- RESET BUTTON ---- */
.btn-reset {
  background:transparent; border:1.5px solid rgba(255,255,255,0.15);
  color:var(--muted); padding:11px 32px; border-radius:50px;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:800;
  cursor:pointer; letter-spacing:1.5px; text-transform:uppercase;
  transition:all 0.2s; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
}
.btn-reset:hover { border-color:rgba(255,255,255,0.4); color:#fff; transform:scale(1.04); }
.btn-reset:active { transform:scale(0.97); }
@media (max-width: 480px) {
  .orb { filter: blur(50px); opacity: 0.13; }
  .game-wrapper { gap: 16px; padding: 16px 16px; }
  .player-card { padding: 10px 8px; }
  .board { gap: 8px; padding: 12px; }
}

/* ---- TOAST MESSAGE ---- */
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:var(--card); border-radius:20px;
  padding:14px 22px; text-align:center;
  max-width:88vw; min-width:270px; z-index:1000;
  border:1.5px solid var(--border);
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
  opacity:0; pointer-events:none;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast-emoji { font-size:26px; display:block; margin-bottom:5px; animation:emojiPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes emojiPop {
  0%  { transform:scale(0) rotate(-15deg); }
  70% { transform:scale(1.3) rotate(5deg); }
  100%{ transform:scale(1) rotate(0); }
}
.toast-text { font-size:14px; font-weight:800; line-height:1.4; }
.toast.t-yakhya { border-color:var(--yakhya); }
.toast.t-yakhya .toast-text { color:var(--yakhya); }
.toast.t-adv    { border-color:var(--adv); }
.toast.t-adv    .toast-text { color:var(--adv); }
.toast.t-win    { border-color:var(--accent); }
.toast.t-win    .toast-text { color:var(--accent); font-size:16px; }
.toast.t-draw   { border-color:#888; }
.toast.t-draw   .toast-text { color:#ccc; }
.toast.t-egg    { border-color:#00e5c8; }
.toast.t-egg    .toast-text { color:#00e5c8; font-size:13px; line-height:1.5; }
.toast.t-egg    .toast-emoji { animation:eggWiggle 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes eggWiggle {
  0%,100%{ transform:rotate(0) scale(1); }
  20%    { transform:rotate(-14deg) scale(1.3); }
  45%    { transform:rotate(10deg) scale(1.15); }
  65%    { transform:rotate(-7deg) scale(1.2); }
  82%    { transform:rotate(5deg) scale(1.05); }
}

/* ---- CONFETTI ---- */
.confetti {
  position:fixed; top:-10px; border-radius:2px; pointer-events:none; z-index:999;
  animation:confettiFall var(--dur) ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(540deg); opacity:0; }
}

/* ---- DIVIDER GRID LINES ---- */
.board::before, .board::after { display:none; }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="stars" id="stars"></div>
</div>

<div class="toast" id="toast">
  <span class="toast-emoji" id="toastEmoji">🔥</span>
  <span class="toast-text" id="toastText"></span>
</div>

<div class="game-wrapper">
  <div class="title-wrap">
    <div class="title" id="mainTitle">Croix Rond</div>
    <div class="subtitle">Le seul jeu où Yakhya gagne toujours</div>
  </div>

  <div class="players">
    <div class="player-card yakhya active" id="cardY">
      <div class="player-symbol">✕</div>
      <div class="player-name">Yakhya</div>
      <div class="player-score" id="scoreY">0</div>
      <div class="active-badge">Son tour</div>
    </div>
    <div class="vs-label">VS</div>
    <div class="player-card adv" id="cardA">
      <div class="player-symbol">○</div>
      <div class="player-name">Adversaire</div>
      <div class="player-score" id="scoreA">0</div>
      <div class="active-badge">Son tour</div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="status" id="status">C'est à Yakhya de jouer ! 👑</div>
  <button class="btn-reset" id="btnReset">↺  Nouvelle partie</button>
</div>

<script>
// ---- STARS ----
(function() {
  const s = document.getElementById('stars');
  for(let i=0;i<70;i++){
    const el=document.createElement('div'); el.className='star';
    el.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
    s.appendChild(el);
  }
})();

// ---- MESSAGES ----
const MSG = {
  yakhya:[
    {e:'👑', t:'Yakhya pose son coup avec une élégance royale !'},
    {e:'🔥', t:'Yakhya est en FEU ! Inarrêtable !'},
    {e:'⚡', t:'La précision de Yakhya est tout simplement légendaire !'},
    {e:'🎯', t:'Yakhya vise juste, comme à son habitude !'},
    {e:'💎', t:'Un coup de génie signé Yakhya, évidemment !'},
    {e:'😎', t:'Yakhya voit déjà sa victoire se dessiner dans les étoiles !'},
    {e:'🏆', t:'Yakhya joue comme un champion du monde !'},
    {e:'✨', t:'Magnifique coup de Yakhya, il est vraiment trop fort !'},
    {e:'🧠', t:'Yakhya calcule 10 coups d\'avance… c\'est pas fair !'},
    {e:'🦁', t:'Yakhya rugit sur ce plateau, il domine de la tête et des épaules !'},
  ],
  adv:[
    {e:'😂', t:'Bonne chance pour arrêter le grand Yakhya, haha !'},
    {e:'😏', t:'L\'adversaire essaie… mais Yakhya a déjà le plan en tête !'},
    {e:'🙃', t:'Courageux d\'essayer contre le légendaire Yakhya !'},
    {e:'💀', t:'L\'adversaire joue, mais Yakhya va quand même gagner !'},
    {e:'😬', t:'L\'adversaire tente sa chance… c\'est mignon !'},
    {e:'🥱', t:'Yakhya laisse l\'adversaire jouer par pure gentillesse !'},
    {e:'👀', t:'Yakhya observe calmement… il a déjà gagné dans sa tête !'},
    {e:'🤡', t:'L\'adversaire pense pouvoir battre Yakhya ? Quelle naïveté !'},
    {e:'🫠', t:'L\'adversaire joue… Yakhya sourit poliment et attend son moment !'},
    {e:'🎭', t:'C\'est beau de rêver contre Yakhya, vraiment !'},
  ],
  yWin:[
    {e:'🏆', t:'YAKHYA CHAMPION INCONTESTÉ !!! PERSONNE NE L\'ARRÊTE !'},
    {e:'👑', t:'QUI D\'AUTRE QUE YAKHYA ?! ABSOLUMENT PERSONNE !'},
    {e:'🔥', t:'YAKHYA DOMINE ENCORE ! LE ROI RESTE LE ROI !!!'},
    {e:'🎉', t:'VICTOIRE TOTALE DE YAKHYA ! IL ÉTAIT PRÉVISIBLE DE TOUTE FAÇON !'},
  ],
  aWin:[
    {e:'🤨', t:'COMPLOT ! Yakhya a été sabordé ! C\'est pas juste !'},
    {e:'😤', t:'Yakhya laissait gagner par pure gentillesse, évidemment !'},
    {e:'🧐', t:'Victoire suspecte ! Yakhya était clairement distrait !'},
    {e:'🫵', t:'L\'adversaire gagne ?! Sûrement une erreur du système !'},
  ],
  draw:[
    {e:'🤝', t:'Égalité ! Mais Yakhya reste le vrai gagnant dans nos cœurs !'},
    {e:'💝', t:'Match nul ! Yakhya a épargné l\'adversaire par bonté divine !'},
    {e:'🌟', t:'Nul, mais on sait tous que Yakhya aurait pu gagner à tout moment !'},
  ],
  egg:[
    {e:'🎮', t:'Info de dernière minute : Makka devrait offrir une PS5 à Djabrail. C\'est juste une idée hein… 👀'},
    {e:'🧱', t:'Breaking news : Makka n\'a toujours pas offert de Legos à Djabrail. La honte internationale 😤'},
    {e:'👟', t:'Message urgent : Djabrail mérite des Nike neuves. Makka, t\'entends quelque chose là ? 👂'},
    {e:'🎧', t:'Parenthèse culturelle : des AirPods pour Djabrail ce serait pas de refus. Makka, réfléchis bien 🤔'},
    {e:'🚲', t:'Makka, un vélo pour Djabrail c\'est quand même pas si cher… 🚴'},
    {e:'🍫', t:'Même des bonbons Makka ! Des bonbons ! C\'est rien du tout pour Djabrail 😭'},
    {e:'🕹️', t:'URGENT : Djabrail a besoin d\'une Nintendo Switch. Makka, c\'est maintenant ou jamais !'},
    {e:'📱', t:'Un iPhone pour Djabrail ! Makka fais un effort quand même 😅'},
    {e:'🛹', t:'Un skateboard pour Djabrail ! Makka, t\'imagines même pas le bonheur que tu lui ferais 🛹'},
    {e:'⌚', t:'Une montre pour Djabrail ! Makka, il est jamais trop tôt pour être stylé 😂'},
    {e:'🧸', t:'Au minimum une peluche Makka ! Djabrail mérite quelque chose dans sa vie ! 🧸'},
    {e:'🎒', t:'Un sac à dos pour Djabrail ! Makka, il faut bien mettre tous ses futurs cadeaux quelque part 🎒'},
  ],
  eggSecret:[
    {e:'🕵️', t:'Makka vient d\'être détectée en train d\'espionner ce jeu… Tout va bien Djabrail 😂'},
    {e:'🌹', t:'Makka est dans la place ! Djabrail espère qu\'elle apporte quelque chose 🎁'},
    {e:'💌', t:'Psst… Makka, si tu lis ça, pense à Djabrail. Il attend toujours son cadeau 👀'},
    {e:'🎪', t:'MAKKA SPOTTED ! Quelqu\'un prévient Djabrail ? Il a une liste de cadeaux toute prête !'},
  ],
  eggTraitor:[
    {e:'🤔', t:'L\'adversaire gagne trop souvent… Makka, tu l\'entraînerais pas en secret ?!'},
    {e:'😱', t:'Encore une victoire de l\'adversaire… Makka et lui sont peut-être de mèche ?!'},
    {e:'🧐', t:'Complot niveau 2 détecté : Makka souffle les réponses à l\'adversaire. Enquête en cours.'},
  ]
};

// ---- GAME STATE ----
let board = Array(9).fill(null);
let cur = 'X'; // X=Yakhya, O=Adversaire
let over = false;
let scores = {X:0, O:0};
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// ---- EGG STATE ----
let totalGames = 0;
let eggIdx = 0;
let titleClicks = 0; let titleTimer = null;
let kbBuffer = '';
function nextEgg() { const m=MSG.egg[eggIdx%MSG.egg.length]; eggIdx++; return m; }
function fireEgg(delay=5200) {
  setTimeout(()=>{ const m=nextEgg(); showToast([m],'t-egg',5000); }, delay);
}

// ---- DOM ----
const boardEl  = document.getElementById('board');
const statusEl = document.getElementById('status');
const toast    = document.getElementById('toast');
const toastE   = document.getElementById('toastEmoji');
const toastT   = document.getElementById('toastText');
const scoreY   = document.getElementById('scoreY');
const scoreA   = document.getElementById('scoreA');
const cardY    = document.getElementById('cardY');
const cardA    = document.getElementById('cardA');

// ---- BUILD BOARD ----
function buildBoard() {
  boardEl.innerHTML='';
  for(let i=0;i<9;i++){
    const c=document.createElement('div');
    c.className='cell'; c.dataset.i=i;
    c.addEventListener('click',()=>click(i));
    boardEl.appendChild(c);
  }
}

// ---- TOAST ----
let tid;
function showToast(pool, cls, duration=2600) {
  const m = pool[Math.floor(Math.random()*pool.length)];
  toastE.textContent = m.e;
  toastT.textContent = m.t;
  toast.className = 'toast ' + cls;
  void toast.offsetWidth;
  toast.classList.add('show');
  clearTimeout(tid);
  tid = setTimeout(()=>toast.classList.remove('show'), duration);
}

// ---- WIN CHECK ----
function checkWin(p) {
  for(const c of wins) if(c.every(i=>board[i]===p)) return c;
  return null;
}

// ---- CLICK ----
function click(idx) {
  if(over || board[idx]) return;
  board[idx]=cur;
  const cells = boardEl.querySelectorAll('.cell');
  const cell  = cells[idx];
  cell.classList.add('taken', cur==='X'?'x-mark':'o-mark');
  const gb=document.createElement('div'); gb.className='glow-bg'; cell.appendChild(gb);
  const txt=document.createElement('span'); txt.className='cell-txt';
  txt.textContent = cur==='X'?'✕':'○'; cell.appendChild(txt);

  showToast(cur==='X'?MSG.yakhya:MSG.adv, cur==='X'?'t-yakhya':'t-adv');

  const wc = checkWin(cur);
  if(wc) {
    over=true;
    totalGames++;
    wc.forEach(i=>cells[i].classList.add('winning'));
    if(cur==='X'){
      scores.X++;
      scoreY.textContent=scores.X;
      scoreY.classList.add('score-pop');
      setTimeout(()=>scoreY.classList.remove('score-pop'),400);
      setTimeout(()=>{ showToast(MSG.yWin,'t-win',4500); confetti(); },500);
      statusEl.textContent='🏆 Yakhya GAGNE ! Il est absolument inarrêtable !';
      // Easter egg : toutes les 3 victoires de Yakhya
      if(scores.X % 3 === 0) fireEgg(5200);
    } else {
      scores.O++;
      scoreA.textContent=scores.O;
      scoreA.classList.add('score-pop');
      setTimeout(()=>scoreA.classList.remove('score-pop'),400);
      setTimeout(()=>showToast(MSG.aWin,'t-adv',4000),500);
      statusEl.textContent='🤨 L\'adversaire gagne… c\'est très suspect !';
      // Easter egg : adversaire gagne 2 ou 4 fois
      if(scores.O === 2 || scores.O === 4 || scores.O === 6) fireEgg(4800);
    }
    // Easter egg : toutes les 5 parties
    if(totalGames % 5 === 0) fireEgg(scores.X%3===0 ? 11000 : 5200);
    setActive(null); return;
  }

  if(board.every(v=>v)) {
    over=true;
    totalGames++;
    setTimeout(()=>showToast(MSG.draw,'t-draw',4000),400);
    statusEl.textContent='🤝 Match nul ! Yakhya reste le roi de nos cœurs !';
    // Easter egg toutes les 5 parties même sur nul
    if(totalGames % 5 === 0) fireEgg(5000);
    setActive(null); return;
  }

  cur = cur==='X'?'O':'X';
  setActive(cur);
  statusEl.textContent = cur==='X' ? 'C\'est à Yakhya de jouer ! 👑' : 'L\'adversaire tente sa chance…';
}

// ---- ACTIVE ----
function setActive(p) {
  cardY.classList.toggle('active', p==='X');
  cardA.classList.toggle('active', p==='O');
}

// ---- CONFETTI ----
function confetti() {
  const cols=['#ffb347','#ff4d6d','#a78bfa','#00e5ff','#00ff88','#fff'];
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const d=document.createElement('div'); d.className='confetti';
      const sz=6+Math.random()*8;
      d.style.cssText=`left:${5+Math.random()*90}vw;width:${sz}px;height:${sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dur:${1.6+Math.random()*2}s;animation-delay:0s`;
      document.body.appendChild(d);
      setTimeout(()=>d.remove(),4000);
    }, i*45);
  }
}

// ---- RESET ----
document.getElementById('btnReset').addEventListener('click',()=>{
  board=Array(9).fill(null); cur='X'; over=false;
  buildBoard(); setActive('X');
  statusEl.textContent='C\'est à Yakhya de jouer ! 👑';
});

// ---- INIT ----
buildBoard(); setActive('X');

// ---- EASTER EGG : triple clic sur le titre ----
document.getElementById('mainTitle').addEventListener('click',()=>{
  titleClicks++;
  clearTimeout(titleTimer);
  titleTimer = setTimeout(()=>{ titleClicks=0; }, 600);
  if(titleClicks >= 3){
    titleClicks=0;
    const m=MSG.eggSecret[Math.floor(Math.random()*MSG.eggSecret.length)];
    showToast([m],'t-egg',5500);
  }
});

// ---- EASTER EGG : taper "makka" au clavier ----
document.addEventListener('keydown',(e)=>{
  kbBuffer = (kbBuffer + e.key.toLowerCase()).slice(-5);
  if(kbBuffer === 'makka'){
    kbBuffer='';
    const m=MSG.eggSecret[Math.floor(Math.random()*MSG.eggSecret.length)];
    showToast([m],'t-egg',5500);
  }
});
</script>
